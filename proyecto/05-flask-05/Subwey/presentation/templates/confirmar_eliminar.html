{% extends "base.html" %}

{% block content %}

<h2>Confirmar eliminación</h2>

<p>
    Vas a eliminar <strong>{{ nombre }}</strong>.
    Esta acción no se puede deshacer.
</p>

<form method="post">
    <button class="btn btn-danger" type="submit">
        Sí, eliminar
    </button>
</form>

<br>

<a class="btn btn-secondary" href="{{ url }}">
    No, volver
</a>

{% endblock %}
